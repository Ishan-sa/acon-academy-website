<svg viewBox="-15 -8 130 130" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ACON Academy">
  <!-- Brand navy rounded background -->
  <rect x="-15" y="-8" width="130" height="130" rx="26" fill="#092758" />

  <!-- ACON Academy mark (cap + classical building + "A"), white -->
  <g fill="none" stroke="none">
    <!-- Mortarboard flat top -->
    <polygon points="50,4 88,18 50,32 12,18" stroke="#FFFFFF" stroke-width="3.2" stroke-linejoin="miter" fill="none" />
    <!-- Cap underside -->
    <path d="M 12,18 L 12,26 Q 50,40 88,26 L 88,18" stroke="#FFFFFF" stroke-width="3.2" fill="none" stroke-linejoin="round" />
    <!-- Tassel cord -->
    <line x1="88" y1="18" x2="88" y2="34" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" />
    <!-- Tassel ball -->
    <circle cx="88" cy="37" r="3" fill="#FFFFFF" />

    <!-- Entablature / top band -->
    <rect x="14" y="44" width="72" height="7" fill="#FFFFFF" rx="0.5" />
    <!-- 5 columns -->
    <rect x="19" y="51" width="4" height="44" fill="#FFFFFF" rx="0.5" />
    <rect x="31" y="51" width="4" height="44" fill="#FFFFFF" rx="0.5" />
    <rect x="48" y="51" width="4" height="44" fill="#FFFFFF" rx="0.5" />
    <rect x="65" y="51" width="4" height="44" fill="#FFFFFF" rx="0.5" />
    <rect x="77" y="51" width="4" height="44" fill="#FFFFFF" rx="0.5" />
    <!-- Stylobate — 3 stepped base lines -->
    <rect x="14" y="95" width="72" height="4.5" fill="#FFFFFF" rx="0.5" />
    <rect x="10" y="101" width="80" height="4.5" fill="#FFFFFF" rx="0.5" />
    <rect x="6" y="107" width="88" height="4.5" fill="#FFFFFF" rx="0.5" />

    <!-- Doorway arch -->
    <path d="M 40,95 L 40,72 Q 50,62 60,72 L 60,95" stroke="#FFFFFF" stroke-width="3.2" fill="none" stroke-linejoin="round" />
    <!-- "A" letterform -->
    <text x="50" y="91" text-anchor="middle" font-size="17" font-weight="700" font-family="Georgia, serif" fill="#FFFFFF">A</text>
  </g>
</svg>
